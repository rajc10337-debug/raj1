<!DOCTYPE html>
<html>
<head>
    <title>Simple Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Header -->
<header>
    <h1>My Shop</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">Products</a>
        <a href="#">Contact</a>
    </nav>
</header>

<!-- Hero -->
<section class="hero">
    <h2>Welcome to My Shop</h2>
    <p>Best products at best prices</p>
    <button>Shop Now</button>
</section>

<!-- Products -->
<section class="products">
    <h2>Products</h2>

    <div class="product">
        <img src="https://via.placeholder.com/150">
        <h3>Shoes</h3>
        <p>₹1000</p>
        <button>Buy</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/150">
        <h3>Watch</h3>
        <p>₹1500</p>
        <button>Buy</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/150">
        <h3>Bag</h3>
        <p>₹800</p>
        <button>Buy</button>
    </div>

</section>

<!-- Contact -->
<section class="contact">
    <h2>Contact</h2>
    <input type="text" placeholder="Name"><br>
    <input type="email" placeholder="Email"><br>
    <button>Send</button>
</section>

<!-- Footer -->
<footer>
    <p>© 2026 My Shop</p>
</footer>

</body>
</html>
